# HappyGhastPet configuration
# Все тексты для игроков вынесены в messages.yml.

# bStats metrics. Зарегистрируй плагин на https://bstats.org/ и укажи его id.
# 0 = метрика выключена.
metrics:
  bstats-plugin-id: 0

# Максимум питомцев на игрока. Погибшие питомцы тоже занимают слот,
# пока их не воскресят или не удалит администратор.
max-pets-per-player: 2

# Дистанция луча для выбора гаста взглядом (команды name/trust и т.п.).
target-distance: 8.0

# Период фонового тика (бафы пассажирам, idle-поведение, звуки, сохранение позиции).
tick-period-ticks: 40

storage:
  # Как часто сохранять позицию активного питомца (в тиках). Реже = меньше нагрузка на БД.
  location-save-period-ticks: 100

pet-name:
  default: "Happy Ghast"
  max-length: 32

display:
  # Плейсхолдеры: {name} {level} {max_level}
  entity-name-format: "{name} &7[Ур. {level}/{max_level}]"
  custom-name-visible: true

experience:
  # Дневной лимит опыта с кормления. Стимулирует разнообразное кормление.
  daily-limit: 150
  # true — питомец повышает уровень сам, как только хватает опыта (без ручного
  # подтверждения в меню). Удобно для новичков; false — классическая ручная прокачка.
  auto-upgrade: false

summon:
  # Кулдаун призыва (телепорт питомца к игроку).
  cooldown-seconds: 7200
  # Призыв работает, только если игрок в том же мире, что и питомец.
  # Нельзя выдернуть гаста из обычного мира в Энд/Ад — лети к нему или проведи через портал.
  same-world-only: true

# Внутренний инвентарь-сундук питомца. Открывается Shift+ПКМ по гасту (только владелец).
# Доступен, только если гаст жив и находится рядом. При смерти вещи выпадают из сундука.
inventory:
  enabled: true
  # Количество слотов, кратно 9 (9, 18, 27, 36, 45, 54).
  size: 27
  # Максимальная дистанция (в блоках) до гаста, чтобы открыть сундук.
  open-radius: 10.0

resurrection:
  required-block: SOUL_CAMPFIRE
  block-radius: 3
  # Жёсткий потолок радиуса, чтобы случайно не сканировать миллионы блоков.
  max-block-radius: 8
  items:
    GHAST_TEAR: 4
    GLOWSTONE_DUST: 16
    PHANTOM_MEMBRANE: 2

speed:
  # Базовая скорость и потолок. Потолок подобран так, чтобы множители уровней
  # применялись без обрезки (иначе лоры врут).
  base: 0.055
  max: 0.12

idle:
  # OFF — обычный гаст; PARKED — зависает на месте после схода; FREEZE — жёстко фиксируется.
  mode: PARKED
  park-after-dismount: true
  # max-distance-from-park и return-speed работают только при disable-ai-when-idle: false.
  max-distance-from-park: 2.0
  return-speed: 0.15
  stop-velocity-when-idle: true
  disable-ai-when-idle: true

sounds:
  ambient:
    enabled: true
    reduction-percent: 80
    min-cooldown-seconds: 15
    volume: 0.7
    pitch: 1.0

feeding:
  # Лимит на один и тот же предмет в день (если у предмета не задан daily-max-items).
  same-food-daily-limit:
    enabled: true
    default-max-items: 8
  # exp — опыт за предмет, daily-max-items — сколько таких предметов в день (0 = без лимита).
  items:
    SNOWBALL:
      exp: 1
      daily-max-items: 16
    SWEET_BERRIES:
      exp: 3
      daily-max-items: 16
    GLOW_BERRIES:
      exp: 6
      daily-max-items: 12
    GLOWSTONE_DUST:
      exp: 6
      daily-max-items: 12
    MAGMA_CREAM:
      exp: 8
      daily-max-items: 8
    HONEY_BOTTLE:
      exp: 10
      daily-max-items: 8
    BLAZE_POWDER:
      exp: 10
      daily-max-items: 8
    PHANTOM_MEMBRANE:
      exp: 15
      daily-max-items: 6
    ENDER_PEARL:
      exp: 15
      daily-max-items: 6
    GHAST_TEAR:
      exp: 25
      daily-max-items: 4
    NETHER_STAR:
      exp: 100
      daily-max-items: 1

# Уровни. На каждом: required-exp (стоимость перехода НА этот уровень),
# display-name (честное описание), speed-multiplier, max-health, passenger-effects.
# Эффекты пассажирам наследуются: уровень получает все эффекты со своего и предыдущих уровней.
# Здоровье: уровень 1 = 10 ХП, далее +2 ХП за уровень.
levels:
